<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff"><title>한 줄 일정</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f5f3;color:#191919;font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif}
main{max-width:640px;margin:auto;padding:52px 18px}.card{background:#fff;border:1px solid #e8e7e4;border-radius:24px;padding:24px;box-shadow:0 12px 35px #0000000d}
h1{margin:0 0 8px;font-size:30px}.sub{margin:0 0 24px;color:#787774;line-height:1.5}
textarea{width:100%;min-height:128px;border:1px solid #d9d8d5;border-radius:16px;padding:17px;font-size:18px;resize:none;outline:none}
textarea:focus{border-color:#37352f}button{width:100%;border:0;border-radius:14px;padding:16px;margin-top:12px;font-size:17px;font-weight:700;background:#37352f;color:#fff}
button:disabled{opacity:.5}.result{display:none;margin-top:18px;background:#f7f7f5;border-radius:16px;padding:16px}.row{margin:8px 0}.label{display:inline-block;width:64px;color:#787774}
.msg{margin-top:14px;font-size:14px;line-height:1.5}.ok{color:#0f7b3e}.err{color:#b42318}.hint{margin-top:18px;color:#9b9a97;font-size:13px;line-height:1.6}
</style></head>
<body><main><div class="card"><h1>한 줄 일정</h1><p class="sub">말하듯 적으면 Notion에 저장해요.</p>
<textarea id="input" placeholder="예: 금요일 오후 2시 30분 친구 만나기"></textarea>
<button id="save" onclick="save()">Notion에 저장</button>
<div id="result" class="result"><div class="row"><span class="label">할 일</span><b id="title"></b></div><div class="row"><span class="label">구분</span><span id="when"></span></div></div>
<div id="msg" class="msg"></div><div class="hint">지원: 오늘·내일·모레, 월~일요일, 7월 12일, 오전·오후, 2시·2시 30분·2:30</div>
</div></main>
<script>
const $=id=>document.getElementById(id), pad=n=>String(n).padStart(2,"0");
const days={"일요일":0,"월요일":1,"화요일":2,"수요일":3,"목요일":4,"금요일":5,"토요일":6};
function parse(raw){
 if(!raw) throw Error("할 일이나 일정을 적어주세요.");
 let d=new Date(); d.setHours(0,0,0,0); let dateFound=true;
 if(raw.includes("모레")) d.setDate(d.getDate()+2);
 else if(raw.includes("내일")) d.setDate(d.getDate()+1);
 else if(raw.includes("오늘")){}
 else { dateFound=false;
  for(const [name,num] of Object.entries(days)) if(raw.includes(name)){let diff=(num-d.getDay()+7)%7;if(diff===0)diff=7;d.setDate(d.getDate()+diff);dateFound=true;break}
  const md=raw.match(/(\d{1,2})월\s*(\d{1,2})일/); if(md){d=new Date(new Date().getFullYear(),+md[1]-1,+md[2]);dateFound=true}
 }
 let h=9,m=0,timeFound=false, x=raw.match(/(\d{1,2}):(\d{2})/), k=raw.match(/(\d{1,2})시(?:\s*(\d{1,2})분)?/);
 if(x){h=+x[1];m=+x[2];timeFound=true}else if(k){h=+k[1];m=+(k[2]||0);timeFound=true}
 if(raw.includes("오후")&&h<12)h+=12;if(raw.includes("오전")&&h===12)h=0;
 let title=raw.replace(/오늘|내일|모레/g,"").replace(/[일월화수목금토]요일/g,"").replace(/\d{1,2}월\s*\d{1,2}일/g,"").replace(/오전|오후/g,"").replace(/\d{1,2}:\d{2}/g,"").replace(/\d{1,2}시(?:\s*\d{1,2}분)?/g,"").replace(/\s+/g," ").trim()||raw;
 if(!dateFound) return {title,type:"할 일",display:"날짜 없음"};
 if(!timeFound) return {title,type:"할 일",start:null,display:`${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`};
 d.setHours(h,m,0,0);
 return {title,type:"일정",start:d.toISOString(),display:`${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(h)}:${pad(m)}`};
}
async function save(){
 const msg=$("msg"), btn=$("save"); msg.textContent="";msg.className="msg";
 try{
  const p=parse($("input").value.trim()); $("title").textContent=p.title;$("when").textContent=`${p.type} · ${p.display}`;$("result").style.display="block";
  btn.disabled=true;btn.textContent="저장 중…";
  const r=await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});
  const j=await r.json(); if(!r.ok)throw Error(j.error||"저장 실패");
  msg.textContent="Notion에 저장했어요 ✓";msg.className="msg ok";$("input").value="";
 }catch(e){msg.textContent=e.message;msg.className="msg err"}finally{btn.disabled=false;btn.textContent="Notion에 저장"}
}
</script></body></html>
